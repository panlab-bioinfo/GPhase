name: gphase
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip

  # Python dependencies used by GPhase + submodules
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.3
  - statsmodels>=0.14
  - matplotlib-base>=3.7
  - networkx>=3.0
  - networkit>=11
  - python-igraph>=0.10
  - igraph>=0.10
  - pysam>=0.22
  - biopython>=1.81
  - argcomplete>=3.0
  - kneed>=0.8
  - python-louvain>=0.16
  - portion>=2.4
  - sortedcontainers>=2.4
  - pathos>=0.3

  # popCNV GUI (optional, but bundled in this repo)
  - pyside6>=6.7

  # External tools called by pipeline scripts
  - samtools>=1.18
  - minimap2>=2.26
  - mosdepth>=0.3.5
  - chromap>=0.2.7
  - seqkit>=2.6
  - yahs>=1.2
  - openjdk>=17
  - bc
  - gawk
  - coreutils
  - util-linux

  # Keep for compatibility with legacy scaffold script paths
  - pip:
      - bio-agptools>=0.0.3
